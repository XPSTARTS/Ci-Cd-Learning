name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run Unit Tests
      run: dotnet test LibraryManager.UnitTests/LibraryManager.UnitTests.csproj --no-build --configuration Release
    
    - name: Run Integration Tests
      run: dotnet test LibraryManager.IntegrationTests/LibraryManager.IntegrationTests.csproj --no-build --configuration Release
    
    - name: Publish API
      run: dotnet publish LibraryManager.Api/LibraryManager.Api.csproj --configuration Release --no-build --output ./publish
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: library-manager-api
        path: ./publish
    
    - name: Deploy to Railway
      run: |
        curl -fsSL https://railway.app/install.sh | sh
        railway up --service bountiful-happiness
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}